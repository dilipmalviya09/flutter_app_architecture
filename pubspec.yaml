name: flutter_app_architecture
description: "Feature-Based Clean Architecture with BLoC + AWS Cognito"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Functional Programming (Either, Option)
  dartz: ^0.10.1

  # HTTP Client
  dio: ^5.7.0

  # Dependency Injection
  get_it: ^8.0.0

  # Value Equality
  equatable: ^2.0.5

  # Local Storage (token caching)
  shared_preferences: ^2.3.4

  # AWS Amplify (uncomment when AWS project is configured)
#  amplify_flutter: ^2.5.0
#  amplify_auth_cognito: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # BLoC Testing
  bloc_test: ^9.1.7

  # Mocking
  mocktail: ^1.0.4

  # Integration Testing
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

